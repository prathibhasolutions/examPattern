{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>403 – Access Denied</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<style>
  body { margin:0; font-family: 'Segoe UI', sans-serif; background:#f0f4ff; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .box { background:white; border-radius:1rem; padding:3rem; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.12); max-width:400px; }
  .icon { font-size:4rem; margin-bottom:1rem; }
  h1 { color:#d63031; font-size:2rem; margin:0 0 0.5rem; }
  p  { color:#636e72; margin:0 0 1.5rem; }
  a  { background:#1e3c72; color:white; padding:0.6rem 1.5rem; border-radius:0.5rem; text-decoration:none; font-weight:600; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">🔒</div>
  <h1>Access Denied</h1>
  <p>This page is restricted to superusers only.</p>
  <a href="/">Back to Home</a>
</div>
</body>
</html>
